[build]
  # No build step: this repo is plain static HTML + Liquid templating that
  # GitHub Pages renders with Jekyll. This Netlify site only exists to host
  # the OAuth functions below, so it publishes a minimal placeholder folder
  # instead of the real site (a leftover dashboard-configured "jekyll build"
  # command would otherwise run here and fail, since there's no
  # Gemfile/Jekyll, hence the explicit no-op build command).
  command = "true"
  publish = "netlify/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/callback"
  to = "/.netlify/functions/callback"
  status = 200
